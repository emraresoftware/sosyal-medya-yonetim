version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sosyal medya yönetim aracı-backend
    ports:
      - "8100:8100"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sosyal medya yönetim aracı-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sosyal medya yönetim aracı-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
